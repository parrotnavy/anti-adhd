name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Swift Tests (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: SwiftPM tests
        run: swift test

      - name: SwiftPM tests (Swift 6 gate)
        run: swift test -Xswiftc -swift-version -Xswiftc 6

  main_artifacts:
    name: Main Artifacts (DMG + Release Notes)
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set VERSION
        run: echo "VERSION=0.0.0-main-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Package DMG
        run: ./scripts/package_dmg.sh "$VERSION"

      - name: Generate release notes (main)
        run: mkdir -p dist && ./scripts/generate_release_notes.sh --version "$VERSION" > dist/RELEASE_NOTES_MAIN.md

      - name: Upload main artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AntiADHD-main-artifacts
          path: |
            dist/*.dmg
            dist/SHA256SUMS.txt
            dist/RELEASE_NOTES_MAIN.md
          if-no-files-found: error
