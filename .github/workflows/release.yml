name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version without leading v (for example 1.2.3)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish macOS release
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      signature: ${{ steps.sparkle.outputs.signature }}
      length: ${{ steps.sparkle.outputs.length }}
      download_url: ${{ steps.release_meta.outputs.download_url }}
      release_page_url: ${{ steps.release_meta.outputs.release_page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          [[ -n "${VERSION}" ]]
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: swift test

      - name: Package DMG
        run: ./scripts/package_dmg.sh "${VERSION}"

      - name: Resolve release URLs
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/AntiADHD-${VERSION}.dmg"
          release_page_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION}"
          echo "download_url=${download_url}" >> "${GITHUB_OUTPUT}"
          echo "release_page_url=${release_page_url}" >> "${GITHUB_OUTPUT}"

      - name: Compute Sparkle signature and length
        id: sparkle
        shell: bash
        env:
          SPARKLE_ED25519_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${SPARKLE_ED25519_PRIVATE_KEY_BASE64:-}" ]]; then
            echo "Missing SPARKLE_ED25519_PRIVATE_KEY_BASE64 secret." >&2
            exit 1
          fi

          dmg_path="dist/AntiADHD-${VERSION}.dmg"
          sign_tool=".build/artifacts/sparkle/Sparkle/bin/sign_update"

          if [[ ! -f "$dmg_path" ]]; then
            echo "Missing DMG artifact: $dmg_path" >&2
            exit 1
          fi

          if [[ ! -x "$sign_tool" ]]; then
            echo "Missing Sparkle sign tool: $sign_tool" >&2
            exit 1
          fi

          key_file="$(mktemp)"
          cleanup() {
            rm -f "$key_file"
          }
          trap cleanup EXIT

          export SPARKLE_KEY_FILE="$key_file"
          python3 - <<'PY'
          import base64
          import os
          import pathlib

          encoded = os.environ["SPARKLE_ED25519_PRIVATE_KEY_BASE64"].strip()
          key_path = pathlib.Path(os.environ["SPARKLE_KEY_FILE"])
          key_path.write_bytes(base64.b64decode(encoded))
          key_path.chmod(0o600)
          PY

          signature="$($sign_tool --ed-key-file "$key_file" -p "$dmg_path" | tr -d '\r\n')"
          if [[ -z "$signature" ]]; then
            echo "Sparkle signature generation failed." >&2
            exit 1
          fi

          length="$(stat -f%z "$dmg_path")"
          if [[ ! "$length" =~ ^[0-9]+$ ]]; then
            echo "Invalid DMG length: $length" >&2
            exit 1
          fi

          echo "signature=$signature" >> "$GITHUB_OUTPUT"
          echo "length=$length" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: ./scripts/generate_release_notes.sh --version "${VERSION}" > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: |
            dist/AntiADHD-${{ steps.version.outputs.version }}.dmg
            dist/SHA256SUMS.txt

  pages:
    name: Update appcast and verify Pages deployment
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update Sparkle appcast
        shell: bash
        env:
          APPCAST_XML: site/api/macos-appcast.xml
          VERSION: ${{ needs.release.outputs.version }}
          DOWNLOAD_URL: ${{ needs.release.outputs.download_url }}
          SIGNATURE: ${{ needs.release.outputs.signature }}
          LENGTH: ${{ needs.release.outputs.length }}
          RELEASE_PAGE_URL: ${{ needs.release.outputs.release_page_url }}
        run: |
          set -euo pipefail
          ./scripts/update_sparkle_appcast.sh

      - name: Commit appcast update
        id: appcast_commit
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail

          if git diff --quiet -- site/api/macos-appcast.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/api/macos-appcast.xml
          git commit -m "chore: update macOS appcast for v${VERSION}" -- site/api/macos-appcast.xml
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch Deploy GitHub Pages workflow
        id: deploy_pages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          workflow_name="Deploy GitHub Pages"
          workflow_file="deploy-pages.yml"
          branch="main"
          expected_head_sha="$(git rev-parse HEAD)"
          poll_seconds=5
          max_discovery_attempts=48
          watch_timeout_seconds=1800

          dispatch_started_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Dispatch correlation window starts at: $dispatch_started_at"
          echo "Expected deploy head SHA: $expected_head_sha"

          gh workflow run "$workflow_name" --ref "$branch"

          run_id=""
          run_url=""
          for attempt in $(seq 1 "$max_discovery_attempts"); do
            matched_run="$(DISPATCH_STARTED_AT="$dispatch_started_at" EXPECTED_HEAD_SHA="$expected_head_sha" gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs" --field branch="$branch" --field event="workflow_dispatch" --field per_page=50 --jq '.workflow_runs | map(select(.created_at >= env.DISPATCH_STARTED_AT and .head_sha == env.EXPECTED_HEAD_SHA and ((.actor.login // "") == "github-actions[bot]"))) | sort_by(.created_at) | .[0] | "\(.id)|\(.html_url)"' 2>/dev/null || true)"

            if [[ -n "$matched_run" ]]; then
              run_id="${matched_run%%|*}"
              run_url="${matched_run#*|}"
              if [[ "$run_id" != "null" && -n "$run_id" ]]; then
                break
              fi
            fi

            if [[ "$attempt" -eq "$max_discovery_attempts" ]]; then
              echo "Timed out waiting for dispatched '$workflow_name' run to appear." >&2
              gh run list --workflow "$workflow_name" --branch "$branch" --limit 5 >&2 || true
              exit 1
            fi

            echo "Waiting for dispatched run to appear ($attempt/$max_discovery_attempts)..."
            sleep "$poll_seconds"
          done

          if [[ -z "$run_url" ]]; then
            run_url="$(gh run view "$run_id" --json url --jq '.url')"
          fi
          echo "Dispatched run id: $run_id"
          echo "Dispatched run URL: $run_url"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

          set +e
          timeout "$watch_timeout_seconds" gh run watch "$run_id" --interval 10 --exit-status
          watch_exit=$?
          set -e

          if [[ "$watch_exit" -ne 0 ]]; then
            if [[ "$watch_exit" -eq 124 ]]; then
              echo "Timed out waiting for run $run_id after ${watch_timeout_seconds}s." >&2
            else
              echo "Dispatched run $run_id failed." >&2
            fi

            echo "Run metadata:" >&2
            gh run view "$run_id" --json status,conclusion,url,event,headBranch,headSha,createdAt,updatedAt,workflowName >&2 || true
            echo "Failed step logs:" >&2
            gh run view "$run_id" --log-failed >&2 || true
            exit 1
          fi

      - name: Validate deployed appcast (post-deploy)
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.version }}
          DOWNLOAD_URL: ${{ needs.release.outputs.download_url }}
          SIGNATURE: ${{ needs.release.outputs.signature }}
        run: |
          set -euo pipefail

          repo_name="${GITHUB_REPOSITORY#*/}"
          appcast_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}/api/macos-appcast.xml"
          expected_dmg="AntiADHD-${VERSION}.dmg"
          echo "Checking live appcast: $appcast_url"

          tmp="$(mktemp)"
          cleanup() { rm -f "$tmp"; }
          trap cleanup EXIT
          export APPCAST_TMP="$tmp"

          max_attempts=60
          sleep_seconds=10

          for i in $(seq 1 "$max_attempts"); do
            echo "Appcast validation attempt $i/$max_attempts"

            reason=""
            if ! curl -fsSL "$appcast_url" -o "$tmp"; then
              reason="Fetch failed"
            else
              xml_ok=true
              if command -v xmllint >/dev/null 2>&1; then
                if ! xmllint --noout "$tmp"; then
                  xml_ok=false
                  reason="Invalid XML"
                else
                  root="$(xmllint --xpath 'local-name(/*)' "$tmp" 2>/dev/null || true)"
                  if [[ "$root" != "rss" ]]; then
                    xml_ok=false
                    reason="Expected root element <rss>, got '$root'"
                  fi
                fi
              else
                if ! python3 -c 'import os, xml.etree.ElementTree as ET; root = ET.parse(os.environ["APPCAST_TMP"]).getroot(); tag = root.tag.split("}", 1)[-1]; assert tag == "rss", f"Expected root element <rss>, got <{root.tag}>"'; then
                  xml_ok=false
                  reason="Invalid XML or unexpected root element"
                fi
              fi

              if [[ "$xml_ok" == "true" ]]; then
                missing=()
                if ! grep -Fq "$DOWNLOAD_URL" "$tmp"; then
                  missing+=("DOWNLOAD_URL")
                fi
                if ! grep -Fq "$expected_dmg" "$tmp"; then
                  missing+=("DMG filename")
                fi
                if ! grep -Fq "sparkle:edSignature=\"${SIGNATURE}\"" "$tmp"; then
                  missing+=("sparkle:edSignature")
                fi

                if [[ "${#missing[@]}" -eq 0 ]]; then
                  echo "Deployed appcast contains expected download URL and DMG: $expected_dmg"
                  exit 0
                fi

                reason="Deployed appcast missing expected token(s): ${missing[*]} (likely Pages propagation delay)"
              fi
            fi

            if [[ "$i" -eq "$max_attempts" ]]; then
              echo "Deployed appcast did not converge after $max_attempts attempts: $appcast_url" >&2
              echo "Last failure: $reason" >&2
              python3 -c 'import os, pathlib; p = pathlib.Path(os.environ.get("APPCAST_TMP", "")); data = p.read_text(encoding="utf-8", errors="replace") if p.exists() else ""; lines = data.splitlines(); print("---- deployed appcast (first 60 lines) ----"); print("\n".join(lines[:60])); print("---- end snippet ----")'
              exit 1
            fi

            echo "$reason; retrying in ${sleep_seconds}s..." >&2
            sleep "$sleep_seconds"
          done
