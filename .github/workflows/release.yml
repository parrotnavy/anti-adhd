name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version without leading v (for example 1.2.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish macOS release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          [[ -n "${VERSION}" ]]
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: swift test

      - name: Package DMG
        run: ./scripts/package_dmg.sh "${VERSION}"

      - name: Generate release notes
        run: ./scripts/generate_release_notes.sh --version "${VERSION}" > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: |
            dist/AntiADHD-${{ steps.version.outputs.version }}.dmg
            dist/SHA256SUMS.txt
