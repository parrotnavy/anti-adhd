name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve CLARITY_PROJECT_ID
        id: clarity
        shell: bash
        run: |
          set -euo pipefail

          var="${{ vars.CLARITY_PROJECT_ID }}"
          secret="${{ secrets.CLARITY_PROJECT_ID }}"

          if [[ -n "$var" ]]; then
            id="$var"
          elif [[ -n "$secret" ]]; then
            id="$secret"
          else
            echo "Missing CLARITY_PROJECT_ID. Set Actions variable CLARITY_PROJECT_ID (preferred) or secret CLARITY_PROJECT_ID." >&2
            exit 1
          fi

          echo "::add-mask::$id"
          echo "id=$id" >>"$GITHUB_OUTPUT"

      - name: Inject Clarity project id into HTML
        shell: bash
        env:
          CLARITY_PROJECT_ID: ${{ steps.clarity.outputs.id }}
        run: |
          set -euo pipefail

          if [[ ! -d site ]]; then
            echo "Expected site/ directory to exist." >&2
            exit 1
          fi

          python3 - <<'PY'
          import os
          import pathlib
          import sys

          root = pathlib.Path("site")
          placeholder = "__CLARITY_PROJECT_ID__"
          clarity = os.environ.get("CLARITY_PROJECT_ID", "")
          if not clarity:
            print("CLARITY_PROJECT_ID env missing", file=sys.stderr)
            raise SystemExit(1)

          html_files = sorted(root.rglob("*.html"))
          if not html_files:
            print("No HTML files found under site/", file=sys.stderr)
            raise SystemExit(1)

          modified = 0
          for path in html_files:
            data = path.read_text(encoding="utf-8")
            if placeholder in data:
              path.write_text(data.replace(placeholder, clarity), encoding="utf-8")
              modified += 1

          print(f"HTML files scanned: {len(html_files)}; files modified: {modified}")
          PY

      - name: Verify Clarity placeholder is fully replaced
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f site/.nojekyll ]]; then
            echo "Missing site/.nojekyll. This file must be committed to disable Jekyll." >&2
            exit 1
          fi

          if grep -R "__CLARITY_PROJECT_ID__" -n site; then
            echo "Clarity placeholder still present after injection; failing." >&2
            exit 1
          fi

      - name: Validate macOS appcast (pre-deploy)
        shell: bash
        run: |
          set -euo pipefail

          appcast_path="site/api/macos-appcast.xml"
          if [[ ! -f "$appcast_path" ]]; then
            echo "Missing $appcast_path. This file must be present in the Pages artifact." >&2
            exit 1
          fi

          if command -v xmllint >/dev/null 2>&1; then
            xmllint --noout "$appcast_path"

            root="$(xmllint --xpath 'local-name(/*)' "$appcast_path" 2>/dev/null || true)"
            if [[ "$root" != "rss" ]]; then
              echo "Expected appcast root element <rss>, got '$root'" >&2
              exit 1
            fi
          else
            python3 - <<'PY'
            import xml.etree.ElementTree as ET

            path = "site/api/macos-appcast.xml"
            root = ET.parse(path).getroot()
            tag = root.tag.split('}', 1)[-1]
            if tag != "rss":
              raise SystemExit(f"Expected appcast root element <rss>, got <{root.tag}>")
            PY
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Validate deployed appcast (post-deploy)
        shell: bash
        run: |
          set -euo pipefail

          appcast_url="${{ steps.deployment.outputs.page_url }}api/macos-appcast.xml"
          echo "Checking deployed appcast: $appcast_url"

          tmp="$(mktemp)"
          cleanup() { rm -f "$tmp"; }
          trap cleanup EXIT
          export APPCAST_TMP="$tmp"

          attempts=10
          sleep_seconds=3
          for i in $(seq 1 "$attempts"); do
            if curl -fsSL "$appcast_url" -o "$tmp"; then
              break
            fi

            if [[ "$i" -eq "$attempts" ]]; then
              echo "Failed to fetch deployed appcast after $attempts attempts: $appcast_url" >&2
              exit 1
            fi

            echo "Fetch failed (attempt $i/$attempts); retrying in ${sleep_seconds}s..." >&2
            sleep "$sleep_seconds"
          done

          if command -v xmllint >/dev/null 2>&1; then
            xmllint --noout "$tmp"
            root="$(xmllint --xpath 'local-name(/*)' "$tmp" 2>/dev/null || true)"
            if [[ "$root" != "rss" ]]; then
              echo "Expected deployed appcast root element <rss>, got '$root'" >&2
              exit 1
            fi
          else
            python3 - <<'PY'
            import os
            import xml.etree.ElementTree as ET

            path = os.environ["APPCAST_TMP"]
            root = ET.parse(path).getroot()
            tag = root.tag.split('}', 1)[-1]
            if tag != "rss":
              raise SystemExit(f"Expected deployed appcast root element <rss>, got <{root.tag}>")
            PY
          fi
